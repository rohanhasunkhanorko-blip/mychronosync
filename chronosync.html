<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chronosync">
<meta name="theme-color" content="#0a0a0c">
<title>Chronosync</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Clash+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0c;
  --s1:       #111114;
  --s2:       #18181d;
  --s3:       #222228;
  --border:   #2e2e38;
  --border2:  #3a3a48;
  --text:     #ededf5;
  --muted:    #5a5a70;
  --muted2:   #3a3a50;
  --cpp:      #a78bfa;
  --py:       #34d399;
  --cyber:    #fb923c;
  --uni:      #60a5fa;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --r: 12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow:hidden;}
body{height:100%;overflow:hidden;touch-action:pan-y;-webkit-overflow-scrolling:touch;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Space Mono',monospace;
  display:flex;flex-direction:column;
  height:100dvh;
}

/* ── NAV TABS ── */
nav{
  display:flex;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  scrollbar-width:none;
  flex-shrink:0;
}
nav::-webkit-scrollbar{display:none;}
.nav-tab{
  flex-shrink:0;
  padding:12px 16px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.5px;
  color:var(--muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .15s;
  white-space:nowrap;
  background:none;
  border-top:none;border-left:none;border-right:none;
  font-family:'Space Mono',monospace;
}
.nav-tab.active{color:var(--text);border-bottom-color:var(--cpp);}
.nav-tab.today-tab{position:relative;}
.nav-tab.today-tab::after{
  content:'';position:absolute;top:8px;right:8px;
  width:5px;height:5px;border-radius:50%;background:var(--py);
}

/* ── PAGES ── */
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px 90px;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
.page.active{display:block;}

/* ── HEADER STRIP ── */
.day-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
  padding-top:2px;
}
.day-title{font-size:22px;font-weight:700;letter-spacing:-1px;font-family:'Space Mono',monospace;}
.day-meta{display:flex;gap:6px;align-items:center;}
.pill{
  font-size:10px;padding:3px 9px;border-radius:99px;
  border:1px solid var(--border);color:var(--muted);
  background:var(--s2);
  font-family:'Space Mono',monospace;
}
.pill.green{border-color:var(--py);color:var(--py);background:rgba(52,211,153,.08);}

/* ── SECTION CARD ── */
.section{
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:12px;
  overflow:hidden;
}
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 13px;
  border-bottom:1px solid var(--border);
}
.sec-tag{
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:3px 8px;border-radius:5px;border:1px solid;
}
.tag-cpp  {color:var(--cpp);  border-color:var(--cpp);  background:rgba(167,139,250,.1);}
.tag-py   {color:var(--py);   border-color:var(--py);   background:rgba(52,211,153,.1);}
.tag-cyber{color:var(--cyber);border-color:var(--cyber);background:rgba(251,146,60,.1);}
.tag-uni  {color:var(--uni);  border-color:var(--uni);  background:rgba(96,165,250,.1);}
.tag-gen  {color:var(--muted);border-color:var(--border);background:var(--s1);}
.sec-time{font-size:10px;color:var(--muted);}

/* ── TASK ROW ── */
.task-row{
  display:flex;align-items:center;gap:11px;
  padding:11px 13px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .1s;
  position:relative;
}
.task-row:last-child{border-bottom:none;}
.task-row:active{background:rgba(255,255,255,.02);}
.chk{
  width:20px;height:20px;flex-shrink:0;
  border-radius:6px;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;background:transparent;
}
.task-row.done .chk{background:var(--py);border-color:var(--py);}
.task-row.done .chk::after{
  content:'';display:block;
  width:9px;height:5px;
  border-left:2px solid #0a0a0c;
  border-bottom:2px solid #0a0a0c;
  transform:rotate(-45deg) translateY(-1px);
}
.task-lbl{flex:1;font-size:13px;color:var(--text);line-height:1.4;transition:color .15s;}
.task-row.done .task-lbl{color:var(--muted2);text-decoration:line-through;}
.task-dur{font-size:10px;color:var(--muted);flex-shrink:0;}
.del-btn{
  font-size:14px;color:var(--muted2);padding:2px 4px;
  cursor:pointer;opacity:0;transition:opacity .15s;
  background:none;border:none;font-family:inherit;
}
.edit-btn{
  font-size:12px;color:var(--muted2);padding:2px 4px;
  cursor:pointer;opacity:0;transition:opacity .15s;
  background:none;border:none;font-family:inherit;
}
.task-row:hover .del-btn,.task-row:hover .edit-btn{opacity:1;}
.sec-del-btn{
  font-size:12px;color:var(--muted2);padding:2px 7px;
  cursor:pointer;background:none;border:1px solid var(--border);
  border-radius:5px;font-family:inherit;flex-shrink:0;
  transition:all .15s;
}
.sec-del-btn:hover,.sec-del-btn:active{color:var(--red);border-color:var(--red);}
@media(hover:none){
  .del-btn,.edit-btn{opacity:0.8;}
}

/* ── ADD TASK ── */
.add-row{
  display:flex;gap:8px;padding:10px 13px;
  border-top:1px solid var(--border);
}
.add-input{
  flex:1;background:var(--s1);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;font-size:12px;
  color:var(--text);font-family:'Space Mono',monospace;
  outline:none;
}
.add-input::placeholder{color:var(--muted);}
.add-input:focus{border-color:var(--border2);}
.add-dur{
  width:52px;background:var(--s1);border:1px solid var(--border);
  border-radius:8px;padding:8px 6px;font-size:12px;
  color:var(--text);font-family:'Space Mono',monospace;
  outline:none;text-align:center;
}
.add-btn{
  background:var(--cpp);border:none;border-radius:8px;
  color:#0a0a0c;font-size:16px;width:34px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-weight:700;transition:opacity .15s;flex-shrink:0;
}
.add-btn:active{opacity:.75;}

/* ── ADD SECTION ── */
.add-section-row{
  display:flex;gap:8px;margin-bottom:12px;
}
.add-section-input{
  flex:1;background:var(--s2);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px;font-size:12px;
  color:var(--text);font-family:'Space Mono',monospace;outline:none;
}
.add-section-input::placeholder{color:var(--muted);}
.tag-select{
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;padding:9px 8px;font-size:11px;
  color:var(--muted);font-family:'Space Mono',monospace;outline:none;
  cursor:pointer;
}
.add-section-btn{
  background:var(--s2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:15px;
  width:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.add-section-btn:active{background:var(--s3);}

/* ── LISTS PAGE ── */
.list-block{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:14px;overflow:hidden;
}
.list-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 13px;border-bottom:1px solid var(--border);
}
.list-name{font-size:13px;font-weight:700;}
.list-prog{font-size:10px;color:var(--muted);}
.list-del{
  font-size:12px;color:var(--red);background:none;border:none;
  cursor:pointer;font-family:inherit;padding:2px 6px;opacity:.6;
}
.list-del:hover{opacity:1;}

/* New list form */
.new-list-form{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:14px;
}
.new-list-form h3{font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;}
.form-row{display:flex;gap:8px;margin-bottom:8px;}
.full-input{
  flex:1;background:var(--s1);border:1px solid var(--border);
  border-radius:8px;padding:9px 11px;font-size:12px;
  color:var(--text);font-family:'Space Mono',monospace;outline:none;
}
.full-input::placeholder{color:var(--muted);}
.full-input:focus{border-color:var(--border2);}
.create-btn{
  background:var(--cpp);border:none;border-radius:8px;
  color:#0a0a0c;font-size:12px;font-weight:700;
  padding:9px 14px;cursor:pointer;font-family:'Space Mono',monospace;
  white-space:nowrap;transition:opacity .15s;
}
.create-btn:active{opacity:.75;}

/* ── HISTORY PAGE ── */
.stats-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;margin-bottom:16px;
}
.stat-card{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;
}
.stat-val{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.5px;}

.chart-card{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:14px;
}
.chart-title{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-bottom:14px;}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.bar{
  width:100%;border-radius:4px 4px 0 0;
  background:var(--s3);
  transition:height .4s cubic-bezier(.4,0,.2,1);
  min-height:3px;
  position:relative;
}
.bar.filled{background:linear-gradient(to top,var(--cpp),var(--py));}
.bar.today-bar{background:linear-gradient(to top,var(--cyber),var(--yellow));}
.bar-lbl{font-size:9px;color:var(--muted);text-align:center;}
.bar-pct{font-size:9px;color:var(--muted);text-align:center;}

/* Streak dots */
.streak-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.streak-dot{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;
  border:1px solid var(--border);
  background:var(--s1);color:var(--muted);
}
.streak-dot.hot{background:rgba(167,139,250,.2);border-color:var(--cpp);color:var(--cpp);}
.streak-dot.med{background:rgba(52,211,153,.15);border-color:var(--py);color:var(--py);}
.streak-dot.cold{background:rgba(251,146,60,.1);border-color:var(--cyber);color:var(--muted);}

/* Subject breakdown */
.breakdown-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.breakdown-row:last-child{border-bottom:none;}
.breakdown-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.breakdown-name{font-size:12px;flex:1;}
.breakdown-bar-wrap{width:80px;height:5px;background:var(--s3);border-radius:99px;overflow:hidden;}
.breakdown-bar{height:100%;border-radius:99px;transition:width .4s;}
.breakdown-cnt{font-size:10px;color:var(--muted);min-width:36px;text-align:right;}

/* ── BOTTOM BAR ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:rgba(10,10,12,.97);
  border-top:1px solid var(--border);
  backdrop-filter:blur(16px);
  display:flex;gap:8px;
  flex-shrink:0;
  z-index:200;
}
.bot-btn{
  flex:1;padding:12px 8px;border-radius:10px;
  background:var(--s2);border:1px solid var(--border);
  color:var(--muted);font-family:'Space Mono',monospace;
  font-size:11px;font-weight:700;cursor:pointer;
  transition:all .15s;
}
.bot-btn:active{transform:scale(.97);}
.bot-btn.primary{background:var(--cpp);border-color:var(--cpp);color:#0a0a0c;}

/* ── PROGRESS BAR GLOBAL ── */
.global-prog{
  height:3px;background:var(--s3);flex-shrink:0;
}
.global-prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--cpp),var(--py));
  transition:width .4s;
}

/* ── WEEK SUMMARY (top of history) ── */
.week-label{
  font-size:10px;color:var(--muted);letter-spacing:.5px;
  margin-bottom:8px;text-transform:uppercase;
}

/* scrollbar */
.page::-webkit-scrollbar{width:3px;}
.page::-webkit-scrollbar-thumb{background:var(--border);}

/* ── SETTINGS PAGE ── */
.settings-section{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:14px;
}
.settings-title{
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;
}
.subject-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.subject-row:last-child{border-bottom:none;}
.subject-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.subject-name{flex:1;font-size:13px;}
.subject-tag-preview{
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:2px 7px;border-radius:5px;border:1px solid;flex-shrink:0;
}
.color-swatches{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.swatch{
  width:26px;height:26px;border-radius:50%;
  cursor:pointer;border:2px solid transparent;
  transition:transform .15s,border-color .15s;
  flex-shrink:0;
}
.swatch:active,.swatch.selected{border-color:var(--text);transform:scale(1.15);}
.new-subject-row{display:flex;gap:8px;margin-top:10px;align-items:center;}
.new-subject-input{
  flex:1;background:var(--s1);border:1px solid var(--border);
  border-radius:8px;padding:9px 11px;font-size:12px;
  color:var(--text);font-family:'Space Mono',monospace;outline:none;
}
.new-subject-input::placeholder{color:var(--muted);}
.new-subject-input:focus{border-color:var(--border2);}
.add-subject-btn{
  background:var(--s2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:15px;
  padding:9px 14px;cursor:pointer;font-family:'Space Mono',monospace;
  font-weight:700;transition:background .15s;white-space:nowrap;
}
.add-subject-btn:active{background:var(--s3);}
.data-row{display:flex;gap:8px;margin-top:10px;}
.data-btn{
  flex:1;background:var(--s2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:12px;
  padding:10px;cursor:pointer;font-family:'Space Mono',monospace;
  font-weight:700;transition:background .15s;text-align:center;
}
.data-btn:active{background:var(--s3);}
</style>
</head>
<body>

<div class="global-prog"><div class="global-prog-fill" id="gp"></div></div>

<nav id="nav"></nav>

<div id="pages"></div>

<!-- Lists page -->
<div class="page" id="page-lists">
  <div class="new-list-form">
    <h3>CREATE NEW LIST</h3>
    <div class="form-row">
      <input class="full-input" id="nl-name" placeholder="List name (e.g. DSA Goals)" maxlength="40">
      <select class="tag-select" id="nl-tag"></select>
    </div>
    <div class="form-row">
      <input class="full-input" id="nl-item" placeholder="Add first item...">
      <button class="create-btn" onclick="createList()">+ Create</button>
    </div>
  </div>
  <div id="lists-container"></div>
</div>

<!-- Settings page -->
<div class="page" id="page-settings">
  <div class="settings-section">
    <div class="settings-title">Your Subjects</div>
    <div id="subjects-list"></div>
  </div>
  <div class="settings-section">
    <div class="settings-title">Add New Subject</div>
    <div class="new-subject-row">
      <input class="new-subject-input" id="new-subj-name" placeholder="Subject name..." maxlength="24">
      <button class="add-subject-btn" onclick="addSubject()">+ Add</button>
    </div>
    <div class="color-swatches" id="color-swatches"></div>
  </div>
  <div class="settings-section">
    <div class="settings-title">Backup Data</div>
    <div style="font-size:10px;color:var(--muted);line-height:1.4">Export your tasks to a file to securely keep them in Google Drive or move them to a new device.</div>
    <div class="data-row">
      <button class="data-btn" onclick="exportData()">↓ Export</button>
      <button class="data-btn" onclick="document.getElementById('import-file').click()">↑ Import</button>
      <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
    </div>
  </div>
</div>

<!-- History page -->
<div class="page" id="page-history">
  <div class="week-label">This week</div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="chart-card">
    <div class="chart-title">DAILY COMPLETION — LAST 4 WEEKS</div>
    <div class="bar-chart" id="bar-chart"></div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;">
      <span style="font-size:9px;color:var(--muted)">4 weeks ago</span>
      <span style="font-size:9px;color:var(--muted)">today</span>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">SUBJECT BREAKDOWN</div>
    <div id="breakdown"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">DAY PERFORMANCE — LAST 28 DAYS</div>
    <div class="streak-row" id="streak-dots"></div>
  </div>
</div>

<div class="bottom-bar" id="bottom-bar">
  <button class="bot-btn" onclick="resetDay()">↺ Day</button>
  <button class="bot-btn" onclick="resetWeek()">↺ Week</button>
</div>

<script>
// ══════════════════════════════════════
//  DATA
// ══════════════════════════════════════
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const BASE_PLAN = {
  Sunday:   {hours:0, sections:[]},
  Monday:   {hours:0, sections:[]},
  Tuesday:  {hours:0, sections:[]},
  Wednesday:{hours:0, sections:[]},
  Thursday: {hours:0, sections:[]},
  Friday:   {hours:0, sections:[]},
  Saturday: {hours:0, sections:[]},
};

const BASE_LISTS = [];

const BASE_SUBJECTS = [];

const PALETTE = [
  '#a78bfa','#34d399','#fb923c','#60a5fa','#f87171','#fbbf24',
  '#818cf8','#2dd4bf','#e879f9','#a3e635','#f472b6','#94a3b8',
  '#38bdf8','#4ade80','#facc15','#c084fc',
];

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
function loadState(){
  try{ return JSON.parse(localStorage.getItem('grind-v4')||'{}'); }catch(e){ return {}; }
}
function saveState(){ localStorage.setItem('grind-v4', JSON.stringify(ST)); }

let ST = loadState();
if(!ST.plan)       ST.plan       = JSON.parse(JSON.stringify(BASE_PLAN));
if(!ST.lists)      ST.lists      = JSON.parse(JSON.stringify(BASE_LISTS));
if(!ST.checks)     ST.checks     = {};
if(!ST.listChecks) ST.listChecks = {};
if(!ST.history)    ST.history    = {};
if(!ST.subjects)   ST.subjects   = JSON.parse(JSON.stringify(BASE_SUBJECTS));

let selectedColor = PALETTE[0];

// ══════════════════════════════════════
//  UTILS
// ══════════════════════════════════════
function today(){ return new Date(); }
function todayStr(){ return fmtDate(today()); }
function fmtDate(d){ return d.toISOString().slice(0,10); }
function dayName(d){ return DAYS[d.getDay()]; }
function uid(){ return Math.random().toString(36).slice(2,8); }

function getDayStats(dateStr, dayN){
  const plan = ST.plan[dayN];
  if(!plan) return {done:0,total:0};
  let done=0,total=0;
  plan.sections.forEach((sec,si)=>{
    sec.tasks.forEach((_,ti)=>{
      total++;
      if(ST.checks[`${dateStr}-${si}-${ti}`]) done++;
    });
  });
  return {done,total};
}

function snapshotToday(){
  const ds = todayStr();
  const dn = dayName(today());
  const s = getDayStats(ds, dn);
  ST.history[ds] = s;
  saveState();
}

// ══════════════════════════════════════
//  BUILD NAV + PAGES
// ══════════════════════════════════════
const nav   = document.getElementById('nav');
const pages = document.getElementById('pages');
const todayDay = dayName(today());
const todayDs  = todayStr();

let currentPage = 'day-'+todayDay;

DAYS.forEach(day=>{
  const tab = document.createElement('button');
  tab.className = 'nav-tab' + (day===todayDay?' today-tab':'');
  tab.textContent = day.slice(0,3).toUpperCase();
  tab.dataset.page = 'day-'+day;
  tab.onclick = ()=>switchPage('day-'+day);
  nav.appendChild(tab);

  const pg = document.createElement('div');
  pg.className = 'page';
  pg.id = 'page-day-'+day;
  pages.appendChild(pg);
});

// Lists tab
const lt = document.createElement('button');
lt.className='nav-tab';lt.textContent='LISTS';lt.dataset.page='lists';
lt.onclick=()=>switchPage('lists');nav.appendChild(lt);

// History tab
const ht = document.createElement('button');
ht.className='nav-tab';ht.textContent='HISTORY';ht.dataset.page='history';
ht.onclick=()=>switchPage('history');nav.appendChild(ht);

// Settings tab
const st = document.createElement('button');
st.className='nav-tab';st.textContent='⚙';st.dataset.page='settings';
st.onclick=()=>switchPage('settings');nav.appendChild(st);

function switchPage(id){
  currentPage = id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const pg = document.getElementById('page-'+id);
  if(pg) pg.classList.add('active');
  const tab = [...document.querySelectorAll('.nav-tab')].find(t=>t.dataset.page===id);
  if(tab) tab.classList.add('active');
  if(id==='lists'){ populateTagSelect('nl-tag'); renderLists(); }
  if(id==='history'){ snapshotToday(); renderHistory(); }
  if(id==='settings') renderSettings();
  if(tab) tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

// ══════════════════════════════════════
//  RENDER DAY
// ══════════════════════════════════════
function renderDay(day){
  const pg = document.getElementById('page-day-'+day);
  if(!pg) return;
  const plan = ST.plan[day];
  const ds = (day===todayDay) ? todayDs : dateStrForDay(day);
  const {done,total} = getDayStats(ds, day);
  const pct = total ? Math.round(done/total*100) : 0;

  let html = `<div class="day-header">
    <span class="day-title">${day}</span>
    <div class="day-meta">
      ${plan?`<span class="pill">${plan.hours}h</span>`:''}
      <span class="pill ${pct===100?'green':''}">${done}/${total} · ${pct}%</span>
    </div>
  </div>`;

  if(!plan){
    html += `<div style="text-align:center;padding:60px 20px;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:12px">🏖️</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:6px">Rest day</div>
      <div style="font-size:12px">No tasks planned</div>
    </div>`;
    pg.innerHTML = html;
    return;
  }

  // Add section
  html += `<div class="add-section-row">
    <input class="add-section-input" id="asi-${day}" placeholder="New section name..." maxlength="30">
    <select class="tag-select" id="ast-${day}">${buildTagOptions()}</select>
    <button class="add-section-btn" onclick="addSection('${day}')">+</button>
  </div>`;

  plan.sections.forEach((sec, si)=>{
    const totalMins = sec.tasks.reduce((a,t)=>a+parseMins(t.dur),0);
    html += `<div class="section" id="sec-${day}-${si}">
      <div class="sec-head">
        <span class="sec-tag" onclick="renameSection('${day}',${si})" title="Tap to rename" style="cursor:pointer;${subjectStyle(sec.tag)}">${sec.label}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="sec-time">${fmtMins(totalMins)}</span>
          <button class="sec-del-btn" onclick="delSection('${day}',${si})" title="Delete section">✕</button>
        </div>
      </div>`;
    sec.tasks.forEach((task, ti)=>{
      const key = `${ds}-${si}-${ti}`;
      const done = ST.checks[key];
      html += `<div class="task-row${done?' done':''}" id="tr-${day}-${si}-${ti}" onclick="toggleTask('${day}',${si},${ti},'${ds}')">
        <div class="chk"></div>
        <span class="task-lbl">${esc(task.text)}</span>
        <span class="task-dur">${task.dur||''}</span>
        <button class="edit-btn" onclick="event.stopPropagation();editTask('${day}',${si},${ti})">✏</button>
        <button class="del-btn" onclick="event.stopPropagation();delTask('${day}',${si},${ti})">✕</button>
      </div>`;
    });
    html += `<div class="add-row">
      <input class="add-input" id="ai-${day}-${si}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addTask('${day}',${si})">
      <input class="add-dur" id="ad-${day}-${si}" placeholder="1h" value="">
      <button class="add-btn" onclick="addTask('${day}',${si})">+</button>
    </div></div>`;
  });

  pg.innerHTML = html;
  updateGlobalProgress();
}

function renderAllDays(){ DAYS.forEach(d=>renderDay(d)); }

// ══════════════════════════════════════
//  TASK ACTIONS
// ══════════════════════════════════════
function toggleTask(day, si, ti, ds){
  const key = `${ds}-${si}-${ti}`;
  ST.checks[key] = !ST.checks[key];
  saveState(); snapshotToday();
  const el = document.getElementById(`tr-${day}-${si}-${ti}`);
  if(el) el.classList.toggle('done', ST.checks[key]);
  updateGlobalProgress();
  updateDayHeader(day, ds);
}

function addTask(day, si){
  const inp = document.getElementById(`ai-${day}-${si}`);
  const dur = document.getElementById(`ad-${day}-${si}`);
  const text = inp.value.trim();
  if(!text) return;
  const plan = ST.plan[day];
  if(!plan || !plan.sections[si]) return;
  plan.sections[si].tasks.push({id:uid(), text, dur: dur.value.trim()||''});
  saveState();
  renderDay(day);
  // refocus
  setTimeout(()=>{
    const el = document.getElementById(`ai-${day}-${si}`);
    if(el) el.focus();
  },50);
}

function delTask(day, si, ti){
  const plan = ST.plan[day];
  if(!plan) return;
  plan.sections[si].tasks.splice(ti,1);
  saveState(); renderDay(day);
}

function addSection(day){
  const inp = document.getElementById(`asi-${day}`);
  const sel = document.getElementById(`ast-${day}`);
  const name = inp.value.trim();
  if(!name) return;
  if(!ST.plan[day]) ST.plan[day] = {hours:5, sections:[]};
  ST.plan[day].sections.push({id:uid(), tag:sel.value, label:name, tasks:[]});
  saveState(); renderDay(day);
}

function updateDayHeader(day, ds){
  // just re-render header portion via full re-render (fast enough)
  renderDay(day);
}

// ══════════════════════════════════════
//  LISTS
// ══════════════════════════════════════
function renderLists(){
  const c = document.getElementById('lists-container');
  let html = '';
  ST.lists.forEach((lst,li)=>{
    const done = lst.items.filter((_,i)=>ST.listChecks[`${lst.id}-${i}`]).length;
    html += `<div class="list-block">
      <div class="list-head">
        <div>
          <span class="list-name">${esc(lst.name)}</span>
          <span class="sec-tag tag-${lst.tag}" style="margin-left:8px;font-size:8px">${lst.tag.toUpperCase()}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="list-prog">${done}/${lst.items.length}</span>
          <button class="list-del" onclick="deleteList(${li})">✕</button>
        </div>
      </div>`;
    lst.items.forEach((item,i)=>{
      const k=`${lst.id}-${i}`;
      const chk=ST.listChecks[k];
      html+=`<div class="task-row${chk?' done':''}" onclick="toggleListItem(${li},${i})">
        <div class="chk"></div>
        <span class="task-lbl">${esc(item)}</span>
        <button class="del-btn" onclick="event.stopPropagation();delListItem(${li},${i})">✕</button>
      </div>`;
    });
    html+=`<div class="add-row">
      <input class="add-input" id="lai-${li}" placeholder="Add item..." onkeydown="if(event.key==='Enter')addListItem(${li})">
      <button class="add-btn" onclick="addListItem(${li})">+</button>
    </div></div>`;
  });
  c.innerHTML = html;
}

function toggleListItem(li, i){
  const lst = ST.lists[li];
  const k = `${lst.id}-${i}`;
  ST.listChecks[k] = !ST.listChecks[k];
  saveState(); renderLists();
}

function addListItem(li){
  const inp = document.getElementById(`lai-${li}`);
  const text = inp.value.trim();
  if(!text) return;
  ST.lists[li].items.push(text);
  saveState(); renderLists();
}

function delListItem(li, i){
  ST.lists[li].items.splice(i,1);
  saveState(); renderLists();
}

function deleteList(li){
  if(!confirm(`Delete "${ST.lists[li].name}"?`)) return;
  ST.lists.splice(li,1);
  saveState(); renderLists();
}

function createList(){
  const name = document.getElementById('nl-name').value.trim();
  const item = document.getElementById('nl-item').value.trim();
  const tag  = document.getElementById('nl-tag').value;
  if(!name) return;
  const lst = {id:'list-'+uid(), name, tag, items: item?[item]:[]};
  ST.lists.push(lst);
  document.getElementById('nl-name').value='';
  document.getElementById('nl-item').value='';
  saveState(); renderLists(); switchPage('lists');
}

// ══════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════
function renderHistory(){
  renderStats(); renderBarChart(); renderBreakdown(); renderStreakDots();
}

function renderStats(){
  const g = document.getElementById('stats-grid');
  // This week
  let wDone=0,wTotal=0,streak=0,best=0,cur=0;
  const now = today();

  // 28 day streak calc
  for(let i=0;i<28;i++){
    const d = new Date(now); d.setDate(d.getDate()-i);
    const ds = fmtDate(d);
    const h = ST.history[ds];
    if(h && h.total>0 && h.done===h.total){ cur++; }
    else if(i>0){ break; }
  }
  streak = cur;

  // This week (Mon-Sun)
  const dow = now.getDay();
  for(let i=0;i<7;i++){
    const d = new Date(now); d.setDate(d.getDate()-((dow+7-i)%7));
    const ds=fmtDate(d); const h=ST.history[ds];
    if(h){wDone+=h.done;wTotal+=h.total;}
  }
  const wPct = wTotal?Math.round(wDone/wTotal*100):0;

  // all time avg
  const vals = Object.values(ST.history).filter(h=>h.total>0).map(h=>Math.round(h.done/h.total*100));
  const avg = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
  const totalDays = Object.values(ST.history).filter(h=>h.total>0&&h.done===h.total).length;

  g.innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:var(--cpp)">${streak}</div><div class="stat-lbl">DAY STREAK</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--py)">${wPct}%</div><div class="stat-lbl">THIS WEEK</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--yellow)">${avg}%</div><div class="stat-lbl">AVG COMPLETION</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--cyber)">${totalDays}</div><div class="stat-lbl">PERFECT DAYS</div></div>
  `;
}

function renderBarChart(){
  const bc = document.getElementById('bar-chart');
  const now = today();
  const bars = [];
  for(let i=27;i>=0;i--){
    const d = new Date(now); d.setDate(d.getDate()-i);
    const ds = fmtDate(d);
    const h = ST.history[ds] || {done:0,total:0};
    const pct = h.total ? Math.round(h.done/h.total*100) : 0;
    bars.push({ds, pct, isToday: ds===todayDs, dayN: d.getDay()});
  }
  // Show every 4th label
  bc.innerHTML = bars.map((b,idx)=>`
    <div class="bar-wrap">
      <div class="bar ${b.isToday?'today-bar':b.pct>0?'filled':''}"
           style="height:${Math.max(b.pct,3)}px"
           title="${b.ds}: ${b.pct}%"></div>
      <div class="bar-lbl">${(idx%7===6)?SHORT[b.dayN]:''}</div>
    </div>
  `).join('');
}

function renderBreakdown(){
  const el = document.getElementById('breakdown');
  const counts = {};
  ST.subjects.forEach(s=>{ counts[s.id]={done:0,total:0,label:s.label,color:s.color}; });
  DAYS.forEach(day=>{
    const plan = ST.plan[day];
    if(!plan) return;
    const ds = dateStrForDay(day);
    plan.sections.forEach((sec,si)=>{
      if(!counts[sec.tag]) return;
      sec.tasks.forEach((_,ti)=>{
        counts[sec.tag].total++;
        if(ST.checks[`${ds}-${si}-${ti}`]) counts[sec.tag].done++;
      });
    });
  });
  el.innerHTML = Object.entries(counts).filter(([,v])=>v.total>0).map(([,v])=>`
    <div class="breakdown-row">
      <div class="breakdown-dot" style="background:${v.color}"></div>
      <span class="breakdown-name">${v.label}</span>
      <div class="breakdown-bar-wrap">
        <div class="breakdown-bar" style="background:${v.color};width:${Math.round((v.done/v.total)*100)}%"></div>
      </div>
      <span class="breakdown-cnt">${v.done}/${v.total}</span>
    </div>
  `).join('') || '<div style="color:var(--muted);font-size:12px;padding:8px 0">No data yet</div>';
}

function renderStreakDots(){
  const el = document.getElementById('streak-dots');
  const now = today();
  const dots = [];
  for(let i=27;i>=0;i--){
    const d = new Date(now); d.setDate(d.getDate()-i);
    const ds = fmtDate(d);
    const h = ST.history[ds] || {done:0,total:0};
    const pct = h.total ? Math.round(h.done/h.total*100) : 0;
    const cls = pct===100?'hot':pct>=50?'med':h.total>0?'cold':'';
    dots.push(`<div class="streak-dot ${cls}" title="${ds}: ${pct}%">${SHORT[d.getDay()]}</div>`);
  }
  el.innerHTML = dots.join('');
}

// ══════════════════════════════════════
//  GLOBAL PROGRESS
// ══════════════════════════════════════
function updateGlobalProgress(){
  let done=0,total=0;
  DAYS.forEach(day=>{
    const plan = ST.plan[day];
    if(!plan) return;
    const ds = dateStrForDay(day);
    plan.sections.forEach((sec,si)=>{
      sec.tasks.forEach((_,ti)=>{
        total++;
        if(ST.checks[`${ds}-${si}-${ti}`]) done++;
      });
    });
  });
  const pct = total?Math.round(done/total*100):0;
  document.getElementById('gp').style.width = pct+'%';
}

// ══════════════════════════════════════
//  RESET
// ══════════════════════════════════════
function resetDay(){
  if(currentPage.startsWith('day-')){
    const day = currentPage.replace('day-','');
    if(!confirm(`Reset ${day}?`)) return;
    const ds = dateStrForDay(day);
    Object.keys(ST.checks).forEach(k=>{if(k.startsWith(ds)) delete ST.checks[k];});
    saveState(); renderDay(day); updateGlobalProgress();
  }
}

function resetWeek(){
  if(!confirm('Reset all daily task checks this week? Skill lists and history kept.')) return;
  DAYS.forEach(day=>{
    const ds = dateStrForDay(day);
    Object.keys(ST.checks).forEach(k=>{if(k.startsWith(ds)) delete ST.checks[k];});
  });
  saveState(); renderAllDays(); updateGlobalProgress();
}

// ══════════════════════════════════════
//  SUBJECTS / SETTINGS
// ══════════════════════════════════════
function subjectStyle(tagId){
  const s = ST.subjects.find(x=>x.id===tagId);
  if(!s) return 'color:var(--muted);border-color:var(--border);background:var(--s1)';
  return `color:${s.color};border-color:${s.color};background:${s.color}22`;
}

function buildTagOptions(selected){
  return ST.subjects.map(s=>
    `<option value="${s.id}"${s.id===selected?' selected':''}>${s.label}</option>`
  ).join('');
}

function populateTagSelect(id){
  const el = document.getElementById(id);
  if(el) el.innerHTML = buildTagOptions();
}

function renderSettings(){
  // Subjects list
  const sl = document.getElementById('subjects-list');
  if(!sl) return;
  if(!ST.subjects.length){
    sl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0">No subjects yet — add one below!</div>';
  } else {
    sl.innerHTML = ST.subjects.map((s,i)=>`
      <div class="subject-row">
        <div class="subject-dot" style="background:${s.color}"></div>
        <span class="subject-name">${esc(s.label)}</span>
        <span class="subject-tag-preview" style="${subjectStyle(s.id)}">${s.label.slice(0,6).toUpperCase()}</span>
        <button class="edit-btn" style="opacity:1;font-size:13px" onclick="editSubject(${i})">✏</button>
        <button class="del-btn" style="opacity:1;font-size:14px" onclick="deleteSubject(${i})">✕</button>
      </div>
    `).join('');
  }
  // Color swatches
  const cs = document.getElementById('color-swatches');
  if(cs) cs.innerHTML = PALETTE.map(c=>
    `<div class="swatch${c===selectedColor?' selected':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c){
  selectedColor = c;
  document.querySelectorAll('.swatch').forEach(el=>{
    el.classList.toggle('selected', el.style.background===c||
      el.style.backgroundColor===c);
  });
}

function addSubject(){
  const inp = document.getElementById('new-subj-name');
  const name = inp.value.trim();
  if(!name) return;
  const id = 'subj-'+uid();
  ST.subjects.push({id, label:name, color:selectedColor});
  saveState();
  inp.value='';
  renderSettings();
  renderAllDays();
}

function deleteSubject(i){
  const s = ST.subjects[i];
  if(!confirm(`Delete subject "${s.label}"? Sections using it will keep their data.`)) return;
  ST.subjects.splice(i,1);
  saveState();
  renderSettings();
  renderAllDays();
}

function editSubject(i){
  const s = ST.subjects[i];
  const newName = prompt('Rename subject:', s.label);
  if(newName !== null && newName.trim()){
    ST.subjects[i].label = newName.trim();
    saveState();
    renderSettings();
    renderAllDays();
  }
}

function delSection(day, si){
  const plan = ST.plan[day];
  if(!plan) return;
  if(!confirm(`Delete "${plan.sections[si].label}" and all its tasks?`)) return;
  plan.sections.splice(si,1);
  saveState(); renderDay(day);
}

function renameSection(day, si){
  const plan = ST.plan[day];
  if(!plan) return;
  const newName = prompt('Rename section:', plan.sections[si].label);
  if(newName !== null && newName.trim()){
    plan.sections[si].label = newName.trim();
    saveState(); renderDay(day);
  }
}

function editTask(day, si, ti){
  const plan = ST.plan[day];
  if(!plan) return;
  const task = plan.sections[si].tasks[ti];
  const newText = prompt('Edit task:', task.text);
  if(newText !== null && newText.trim()){
    task.text = newText.trim();
    saveState(); renderDay(day);
  }
}

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
function dateStrForDay(day){
  // Find the most recent occurrence of this day in the current week (Mon-Sun cycle)
  const now = today();
  const targetDow = DAYS.indexOf(day);
  const curDow = now.getDay();
  // Days back to Mon of this week
  const monOffset = (curDow+6)%7; // days since Monday
  // Day of week within week Mon=1..Sun=0
  const targetOffset = targetDow===0?6:targetDow-1;
  const d = new Date(now);
  d.setDate(d.getDate() - monOffset + targetOffset);
  return fmtDate(d);
}

function parseMins(d){
  if(!d) return 0;
  const m = d.match(/([\d.]+)h/);
  return m ? Math.round(parseFloat(m[1])*60) : 0;
}

function fmtMins(m){
  if(!m) return '';
  return m>=60 ? (m/60).toFixed(m%60===0?0:1)+'h' : m+'m';
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function exportData(){
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(ST));
  const el = document.createElement('a');
  el.setAttribute("href", dataStr);
  el.setAttribute("download", `grind-backup-${todayStr()}.json`);
  document.body.appendChild(el);
  el.click();
  el.remove();
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      const imported = JSON.parse(evt.target.result);
      if(imported && imported.plan){
        if(confirm("This will overwrite your current tasks and stats. Continue?")){
          ST = imported;
          saveState();
          location.reload();
        }
      } else {
        alert("Invalid file format.");
      }
    }catch(err){
      alert("Error reading file.");
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}
